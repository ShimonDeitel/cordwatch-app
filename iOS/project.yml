name: Cordwatch
options:
  bundleIdPrefix: com.shimondeitel.cordwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cordwatch:
    type: application
    platform: iOS
    sources:
      - path: Cordwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cordwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CordwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CordwatchTests
      - path: Cordwatch.storekit
    dependencies:
      - target: Cordwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CordwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CordwatchUITests
    dependencies:
      - target: Cordwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cordwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cordwatch:
    build:
      targets:
        Cordwatch: all
        CordwatchTests: [test]
        CordwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cordwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Cordwatch.storekit
      targets:
        - CordwatchTests
        - CordwatchUITests
    archive:
      config: Release
